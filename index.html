<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos</title>
    <link rel="stylesheet" href="https://unpkg.com/mvp.css@1.15/mvp.css">
</head>
<body>
    <div id="elm-app"></div>
    <!-- main.js es el archivo compilado por Elm -->
    <script src="main.js"></script>
    <script>
        // Cargar datos completos desde la nueva clave
        var storedData = localStorage.getItem('facturasData');
        var initialFlags = storedData ? JSON.parse(storedData) : null;

        var app = Elm.Main.init({
            node: document.getElementById('elm-app'),
            flags: initialFlags
        });

        app.ports.saveStorage.subscribe(function(data) {
            localStorage.setItem('facturasData', JSON.stringify(data));
        });
    </script>
</body>
</html>
